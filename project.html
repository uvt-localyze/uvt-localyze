       1. CONFIG
  ====================================================== -->

  <style>
    .project-summary-card {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .project-summary-card:hover {
      border-color: rgba(34,197,94,0.45);
      transform: translateY(-2px);
    }

    .project-toggle {
      margin-top: 14px;
      color: #22C55E;
      font-weight: bold;
      font-size: 14px;
    }

    .project-hidden-content {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.10);
    }

    .project-hidden-content.active {
      display: block;
      animation: fadeProject 0.35s ease;
    }

    @keyframes fadeProject {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

            <p id="proposal1Text"></p>
          </div>

            <strong id="proposal2Title"></strong>

          </div>

          <div class="step">
            <strong id="proposal3Title"></strong>

      </section>

        <p class="sub" id="brings2"></p>
      </section>

        <p class="sub" id="adds2"></p>

          <div class="journey-progress-fill" id="journeyProgressFill"></div>

            <strong id="phase3Title"></strong>

            <strong id="phase4Title"></strong>

          </div>

            <strong id="phase5Title"></strong>
            <span>3,000 → 5,000 UVT</span>
            <p id="phase5Text"></p>

    function setLang(lang) {
      const selected = translations[lang] ? lang : "en";
      const t = translations[selected];

      localStorage.setItem("uvt_lang", selected);

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute("content", t.metaDescription);
      }

      Object.keys(t).forEach((key) => {
        const el = document.getElementById(key);
        if (el) {
          el.innerText = t[key];
        }
      });

      updateProjectToggleText();
    }

    function updateProjectToggleText() {
      const content = document.getElementById("projectHiddenContent");
      const text = document.getElementById("projectToggleText");
      const lang = localStorage.getItem("uvt_lang") || "en";
      const t = translations[lang] || translations.en;

      if (!content || !text) return;

      text.innerText = content.classList.contains("active")
        ? t.toggleClose
        : t.toggleOpen;
    }

    function toggleProjetoDetalhes() {
      const content = document.getElementById("projectHiddenContent");
      if (!content) return;

      content.classList.toggle("active");
      updateProjectToggleText();
    }

    const savedLang = localStorage.getItem("uvt_lang") || "en";
    setLang(savedLang);
