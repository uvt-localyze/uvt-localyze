<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =====================================================
       1. CONFIG
  ====================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Community Action | UVT Localyze</title>

  <meta name="description" content="Register your participation in community actions and contribute real territorial data.">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app">

    <!-- =====================================================
         2. TOPBAR
    ====================================================== -->
    <header class="topbar">
      <img src="assets/Logotipo UVT Localyze.png" class="logo" alt="UVT Localyze Logo">

      <span class="badge" id="badge">Community action</span>

      <div class="lang-switch" aria-label="Select language">
        <button type="button" onclick="setLang('pt')" aria-label="Português">🇧🇷</button>
        <button type="button" onclick="setLang('en')" aria-label="English">🇺🇸</button>
        <button type="button" onclick="setLang('es')" aria-label="Español">🇪🇸</button>
      </div>
    </header>


    <!-- =====================================================
         3. CONTENT
    ====================================================== -->
    <main>

      <!-- HERO -->
      <section class="hero card">
        <h1 id="title"></h1>

        <p class="sub" id="intro1"></p>

        <p class="prototype-note" id="introNote"></p>
      </section>


      <!-- EXPLANATION -->
      <section class="card">
        <h3 id="whatTitle"></h3>

        <p class="sub" id="whatIntro"></p>

        <ul class="sub">
          <li id="item1"></li>
          <li id="item2"></li>
          <li id="item3"></li>
          <li id="item4"></li>
          <li id="item5"></li>
        </ul>
      </section>


      <!-- FORM -->
      <section class="card">
        <h3 id="formTitle"></h3>

        <form id="communityForm" class="form">

          <label>
            <span id="labelName"></span>
            <input type="text" id="actionName" required>
          </label>

          <label>
            <span id="labelDesc"></span>
            <textarea id="actionDesc" required></textarea>
          </label>

          <label>
            <span id="labelLocation"></span>
            <input type="text" id="actionLocation" required>
          </label>

          <label>
            <span id="labelDate"></span>
            <input type="date" id="actionDate" required>
          </label>

          <label>
            <span id="labelPhoto"></span>
            <input type="text" id="actionPhoto">
          </label>

          <button type="submit" class="btn primary" id="submitBtn"></button>

        </form>
      </section>


      <!-- UVT EXPLANATION -->
      <section class="card impact">
        <h3 id="valueTitle"></h3>

        <p class="sub" id="value1"></p>
        <p class="sub" id="value2"></p>
        <p class="sub" id="value3"></p>
      </section>


      <!-- IMPACT -->
      <section class="card impact">
        <h3 id="impactTitle"></h3>

        <p class="sub" id="impactIntro"></p>

        <ul class="sub">
          <li id="impact1"></li>
          <li id="impact2"></li>
          <li id="impact3"></li>
          <li id="impact4"></li>
        </ul>
      </section>


      <!-- NAVIGATION -->
      <section class="card nav-actions">
        <a href="action.html" class="btn secondary" id="backBtn"></a>
        <a href="dashboard.html" class="btn secondary" id="dashboardBtn"></a>
      </section>

    </main>

  </div>


  <!-- DASHBOARD -->
  <a href="dashboard.html" class="dashboard-floating-card" aria-label="Open live dashboard">
    <span class="dash-label" id="dashLabel"></span>
    <strong><span id="teaserUVT">0</span> UVT</strong>
    <small id="dashText"></small>
  </a>

    function setLang(lang) {
      const selected = translations[lang] ? lang : "en";
      const t = translations[selected];

      localStorage.setItem("uvt_lang", selected);

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute("content", t.metaDescription);
      }

      Object.keys(t).forEach((key) => {
        const el = document.getElementById(key);
        if (el) {
          el.innerText = t[key];
        }
      });

      document.getElementById("actionName").placeholder = t.placeholderName;
      document.getElementById("actionDesc").placeholder = t.placeholderDesc;
      document.getElementById("actionLocation").placeholder = t.placeholderLocation;
      document.getElementById("actionPhoto").placeholder = t.placeholderPhoto;
    }

    const savedLang = localStorage.getItem("uvt_lang") || "en";
    setLang(savedLang);

    document.getElementById("communityForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const selectedLang = localStorage.getItem("uvt_lang") || "en";
      const currentText = translations[selectedLang] || translations.en;

      const action = {
        name: document.getElementById("actionName").value,
        desc: document.getElementById("actionDesc").value,
        location: document.getElementById("actionLocation").value,
        date: document.getElementById("actionDate").value,
        photo: document.getElementById("actionPhoto").value,
        type: "community_action",
        uvt: 25,
        createdAt: new Date().toISOString()
      };

      let actions = JSON.parse(localStorage.getItem("communityActions") || "[]");
      actions.push(action);
      localStorage.setItem("communityActions", JSON.stringify(actions));

      let uvt = parseInt(localStorage.getItem("uvt") || "0", 10);
      uvt += 25;
      localStorage.setItem("uvt", uvt);

      alert(currentText.successMessage);

      window.location.href = "dashboard.html";
    });
  </script>
