      <!-- =====================================================
           3.1 HERO / ENTRY
      ====================================================== -->

        ====================================================== -->

        </div>


        <!-- =====================================================
             3.3 LEVEL / REPUTATION
        ====================================================== -->

            <span id="levelIcon">🌱</span>

          </div>

          <div class="level-progress-bar">
            <div class="level-progress-fill" id="userLevelProgress"></div>
          </div>

          <span class="level-next" id="userLevelNext">
            Keep participating to level up.
          </span>
        </div>


        <!-- =====================================================
             3.4 SAVE WALLET
        ====================================================== -->
        <div class="wallet-save-box">
          <strong id="walletSaveTitle"></strong>

          <p id="walletSaveText"></p>

          <button onclick="loginComGoogle()" class="btn wallet-btn" id="walletSaveBtn"></button>
        </div>

             3.5 MAIN CTAS
        ====================================================== -->
        <div class="cta-group">

      <!-- =====================================================
           5. HOW IT WORKS
      ====================================================== -->

            <p id="step2Text"></p>

          </div>

      </section>


      <!-- =====================================================
           6. WHY IT MATTERS
      ====================================================== -->

        <p class="sub" id="why1"></p>
        <p class="sub" id="why2"></p>
      </section>

    function setLang(lang) {
      const selected = translations[lang] ? lang : "en";
      const t = translations[selected];

      localStorage.setItem("uvt_lang", selected);

      document.documentElement.lang = t.htmlLang;
      document.title = t.pageTitle;

      const metaDescription = document.querySelector('meta[name="description"]');
      if (metaDescription) {
        metaDescription.setAttribute("content", t.metaDescription);
      }

      Object.keys(t).forEach((key) => {
        const el = document.getElementById(key);
        if (el) {
          el.innerText = t[key];
        }
      });

      const userLevel = document.getElementById("userLevel");
      if (
        (userLevel && userLevel.innerText.includes("Level 1")) ||
        (userLevel && userLevel.innerText.includes("Nível 1")) ||
        (userLevel && userLevel.innerText.includes("Nivel 1"))
      ) {
        userLevel.innerText = t.userLevelText;
      }

      const userLevelNext = document.getElementById("userLevelNext");
      if (userLevelNext) {
        userLevelNext.innerText = t.userLevelNextText;
      }
    }

    const savedLang = localStorage.getItem("uvt_lang") || "en";
    setLang(savedLang);
