  <div class="saldo-box">
    <p id="uvtLabel"></p>
    <h2><span id="impactoTotal">0</span> UVT</h2>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="impactoBarra"></div>
    </div>

    <p class="sub">
      <span id="milestoneText"></span>
      <strong id="metaImpacto">300</strong> UVT
    </p>

</section>


<section class="card impact">

</section>

  </div>

  <div class="journey-steps">

    <div class="journey-step"><strong id="f3"></strong></div>
    <div class="journey-step"><strong id="f4"></strong></div>
    <div class="journey-step"><strong id="f5"></strong></div>
    <div class="journey-step"><strong id="f6"></strong></div>
    <div class="journey-step"><strong id="f7"></strong></div>
    <div class="journey-step"><strong id="f8"></strong></div>
  </div>
</section>


<section class="card impact">
  <h3 id="uvtMeaningTitle"></h3>
  <p class="sub" id="uvt1"></p>
  <p class="sub" id="uvt2"></p>
  <p class="prototype-note" id="uvt3"></p>
</section>


<section class="card">
  <h3 id="ctaTitle"></h3>

  <p class="sub" id="cta1"></p>
  <p class="sub" id="cta2"></p>

  <a href="poll.html" class="btn primary" id="pollBtn"></a>
  <a href="action.html" class="btn secondary" id="actionBtn"></a>
  <a href="dashboard.html" class="btn secondary" id="dashBtn"></a>
  <a href="index.html" class="btn secondary" id="backBtn"></a>
</section>

</main>
</div>

function setLang(lang){
const selected=t[lang]?lang:"en";

const el=document.getElementById(k);
if(el) el.innerText=d[k];
});
}
